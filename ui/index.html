<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seeking Alpha Scraper | Premium Dashboard</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-['Inter']">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass-effect border-b border-gray-800/50 py-4 px-6 mb-8">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i data-lucide="bar-chart-3" class="text-white"></i>
                </div>
                <h1 class="text-2xl font-['Outfit'] font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                    Seeking Alpha Scraper
                </h1>
            </div>
            <div class="flex items-center space-x-4">
                <span id="status-badge" class="px-3 py-1 bg-gray-900 border border-gray-800 rounded-full text-xs text-gray-400 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                    API Çevrimiçi
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Sol Panel: Kontroller -->
            <div class="lg:col-span-4 space-y-8">
                <div class="card p-6 glass-effect">
                    <h2 class="text-lg font-['Outfit'] font-semibold mb-6 flex items-center">
                        <i data-lucide="settings-2" class="mr-2 text-cyan-400"></i> İşlem Ayarları
                    </h2>
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-sm text-gray-400">Hisse Sembolleri (Virgül ile ayırın)</label>
                            <input id="symbols" type="text" placeholder="AAPL, TSLA, MSFT" 
                                class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-3 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all">
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-3 bg-gray-900/30 rounded-xl border border-white/5">
                                <div class="flex items-center space-x-3">
                                    <i data-lucide="file-text" class="text-gray-400 w-5"></i>
                                    <div>
                                        <p class="text-sm font-medium">Tam İçerik Çek</p>
                                        <p class="text-[10px] text-gray-500">Makale gövdelerini çeker</p>
                                    </div>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input id="includeContent" type="checkbox" class="sr-only peer">
                                    <div class="w-11 h-6 bg-gray-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-cyan-600"></div>
                                </label>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm text-gray-400">Makale Sayısı: <span id="articleValue">5</span></label>
                                <input id="maxArticles" type="range" min="1" max="20" value="5" 
                                    class="w-full h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-cyan-500">
                            </div>
                        </div>
                        <button id="startBtn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 py-4 rounded-xl font-semibold shadow-xl shadow-cyan-500/20 transition-all flex items-center justify-center space-x-2 active:scale-[0.98]">
                            <i data-lucide="play" class="w-5"></i>
                            <span>İşlemi Başlat</span>
                        </button>
                    </div>
                </div>

                <div class="card p-6 glass-effect overflow-hidden">
                    <h2 class="text-lg font-['Outfit'] font-semibold mb-4 flex items-center">
                        <i data-lucide="history" class="mr-2 text-blue-400"></i> Son Sonuçlar
                    </h2>
                    <div id="resultsList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Sonuçlar buraya gelecek -->
                        <div class="text-center py-8 text-gray-500 italic text-sm">Henüz sonuç yok.</div>
                    </div>
                </div>
            </div>

            <!-- Sağ Panel: Loglar & Detaylar -->
            <div class="lg:col-span-8 flex flex-col h-full">
                <div class="card glass-effect flex-grow flex flex-col overflow-hidden min-h-[600px]">
                    <div class="border-b border-gray-800/50 p-4 flex items-center justify-between bg-gray-900/40">
                        <div class="flex items-center space-x-2">
                            <span class="w-3 h-3 bg-red-500 rounded-full"></span>
                            <span class="w-3 h-3 bg-yellow-500 rounded-full"></span>
                            <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                            <span class="ml-4 text-xs font-mono text-gray-400 tracking-wider">LIVE_CONSOLE_V1.0</span>
                        </div>
                        <button id="clearLogs" class="text-gray-500 hover:text-white transition-colors">
                            <i data-lucide="trash-2" class="w-4"></i>
                        </button>
                    </div>
                    <div id="logTerminal" class="p-6 font-mono text-sm overflow-y-auto flex-grow bg-black/40 custom-scrollbar leading-relaxed">
                        <div class="text-cyan-500/80 mb-2">System >> Seeking Alpha Scraper başlatıldı. Hazır...</div>
                        <div class="text-gray-600 mb-4 cursor">_</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-8 text-gray-600 text-xs mt-auto">
        &copy; 2026 Antigravity Scrapper | Built with FastAPI & Tailwind
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
